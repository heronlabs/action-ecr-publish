name: action-ecr-publish

author: Heron Labs

description: Publish ECR

inputs:
  AWS_ROLE_TO_ASSUME:
    description: inputs.AWS_ROLE_TO_ASSUME
    required: false
  AWS_REGION:
    description: inputs.AWS_REGION
    required: false
  AWS_ROLE_DURATION_SECONDS:
    description: inputs.AWS_ROLE_DURATION_SECONDS
    required: false
  AWS_REPOSITORY:
    description: inputs.AWS_REPOSITORY
    required: false
  BUILD_NAME:
    description: inputs.BUILD_NAME
    required: true
  FILE_NAME:
    description: inputs.FILE_NAME
    required: true
  TAG_NAME:
    description: inputs.TAG_NAME
    required: true
  TAG_ALIAS:
    description: 'Comma-separated alias tags to apply to the same image (e.g. "v1,v1.2")'
    required: false
  NODE_AUTH_TOKEN:
    description: inputs.NODE_AUTH_TOKEN
    required: false

runs:
  using: composite
  steps:
    - name: 'Lint Check'
      run: docker run --rm --interactive hadolint/hadolint < ${{ inputs.FILE_NAME }}
      shell: bash

    - name: 'Build'
      run: |
        SECRET_ARG=""
        if [ -n "$NODE_AUTH_TOKEN" ]; then
          SECRET_ARG="--secret id=NODE_AUTH_TOKEN,env=NODE_AUTH_TOKEN"
        fi
        docker build \
          $SECRET_ARG \
          --provenance=false \
          --tag "${{ inputs.BUILD_NAME }}:${{ inputs.TAG_NAME }}" \
          -f "${{ inputs.FILE_NAME }}" .
      shell: bash
      env:
        NODE_AUTH_TOKEN: ${{ inputs.NODE_AUTH_TOKEN }}

    - uses: aws-actions/configure-aws-credentials@v6
      if: ${{ inputs.AWS_ROLE_TO_ASSUME }}
      with:
        aws-region: ${{ inputs.AWS_REGION }}
        role-to-assume: ${{ inputs.AWS_ROLE_TO_ASSUME }}
        role-duration-seconds: ${{ inputs.AWS_ROLE_DURATION_SECONDS }}
        role-session-name: action-ecr-publish-session

    - uses: aws-actions/amazon-ecr-login@v2
      if: ${{ inputs.AWS_ROLE_TO_ASSUME }}

    - name: 'Publish image on ECR'
      if: ${{ inputs.AWS_ROLE_TO_ASSUME }}
      shell: bash
      run: bash ${{ github.action_path }}/core/publish-ecr-image.sh
      env:
        AWS_REPOSITORY: ${{ inputs.AWS_REPOSITORY }}
        BUILD_NAME: ${{ inputs.BUILD_NAME }}
        TAG_NAME: ${{ inputs.TAG_NAME }}
        TAG_ALIAS: ${{ inputs.TAG_ALIAS }}
